apiVersion: v1
kind: Service
metadata:
  name: spring-service
  namespace: dev
spec:
  selector:
    app: spring-petclinic
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
