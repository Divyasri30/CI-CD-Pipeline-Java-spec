apiVersion: v1
kind: Namespace
metadata:
  name: dev

-------------

apiVersion: v1
kind: ConfigMap 
metadata: 
  name: spring-Config
  namespace: dev
data:
  SPRING_PROFILES_ACTIVE: "dev"
  APP_NAME: "spring-pet-clinic"

-----------

apiVersion: v1
kind: Secret
metadata:
  name: spring-secret
  namespace: dev

