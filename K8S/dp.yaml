-------------


  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic
  namespace: dev
  labels:
    app: spring-petclinic
spec:
  minReadySeconds: 5
  replicas: 3
  selector:
    matchLabels:
      app: spring-petclinic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      name: my-pod
      labels:
        app: spring-petclinic
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: spring-petclinic
          image: ghcr.io/divyasri-zelar/spring-pet-clinic:1.1

          imagePullPolicy: Always

          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
              name: spring-config

          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: spring-secret
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-secret
                  key: DB_PASSWORD

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15

          volumeMounts:
            - name: app-storage
              mountPath: /logs

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: spring-pvc